  </head>

  <body>
    <div class="container">
      <h1>Configuración del Bot</h1>

      ```
      <label>Temas</label>
      <div class="tags-container" id="tagsContainer">
        <input id="temaInput" placeholder="Escribí y presioná Enter" />
      </div>

      <label>Intervalo (ms)</label>
      <input id="intervalo" type="number" min="10000" value="60000" />

      <label>Idioma</label>
      <select id="idioma">
        <option value="es">es</option>
        <option value="en">en</option>
      </select>

      <button id="saveButton">Guardar configuración</button>
      <p id="status"></p>
    </div>

    <script>
      const temaInput = document.getElementById("temaInput");
      const tagsContainer = document.getElementById("tagsContainer");
      const intervaloInput = document.getElementById("intervalo");
      const idiomaSelect = document.getElementById("idioma");
      const statusText = document.getElementById("status");

      let temas = [];

      function renderTags() {
        tagsContainer.querySelectorAll(".tag").forEach((e) => e.remove());

        temas.forEach((tema, index) => {
          const tag = document.createElement("div");
          tag.className = "tag";
          tag.innerHTML = `${tema} <span data-index="${index}">×</span>`;
          tagsContainer.insertBefore(tag, temaInput);
        });
      }

      temaInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();

          const value = temaInput.value.trim();

          if (value && !temas.includes(value)) {
            temas.push(value);
            renderTags();
          }

          temaInput.value = "";
        }
      });

      tagsContainer.addEventListener("click", (e) => {
        if (e.target.tagName === "SPAN") {
          const index = e.target.dataset.index;
          temas.splice(index, 1);
          renderTags();
        }
      });

      async function loadConfig() {
        try {
          const res = await fetch("/config");
          const config = await res.json();

          temas = config.temas || [];
          intervaloInput.value = config.intervalo || 60000;
          idiomaSelect.value = config.idioma || "es";

          renderTags();
        } catch {
          statusText.textContent = "Error cargando config";
        }
      }

      async function saveConfig() {
        if (!temas.length) {
          statusText.textContent = "Agregá al menos un tema";
          return;
        }

        const config = {
          temas,
          intervalo: Number(intervaloInput.value),
          idioma: idiomaSelect.value,
        };

        try {
          await fetch("/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(config),
          });

          statusText.textContent = "Guardado";
        } catch {
          statusText.textContent = "Error al guardar";
        }
      }

      document
        .getElementById("saveButton")
        .addEventListener("click", saveConfig);

      loadConfig();
    </script>
    ```
  </body>
