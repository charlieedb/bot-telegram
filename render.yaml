services:
  - type: web
    name: noticiasya-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://noticias-ya.web.app
      - key: RUN_BOT
        value: "true"
      - key: TELEGRAM_MODE
        value: webhook
      - key: TELEGRAM_WEBHOOK_PATH
        value: /telegram/webhook
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: noticias-ya
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
